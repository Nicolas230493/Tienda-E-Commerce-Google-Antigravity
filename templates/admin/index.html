{% extends "admin/index.html" %}
{% load i18n static %}

{% block extrastyle %}
{{ block.super }}
<style>
    :root {
        --impulso-cyan: #22d3ee;
        --impulso-dark: #0f172a;
    }
    #content-main {
        display: flex;
        flex-direction: column;
    }
    .impulso-banner {
        background: linear-gradient(135deg, var(--impulso-dark) 0%, #1e293b 100%);
        border: 1px solid #334155;
        border-radius: 12px;
        padding: 30px;
        margin-bottom: 30px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        order: -1; /* Lo pone al principio */
    }
    .impulso-text h2 {
        color: var(--impulso-cyan) !important;
        font-weight: 900 !important;
        margin: 0 0 5px 0 !important;
        text-transform: uppercase;
        letter-spacing: -0.5px;
    }
    .impulso-text p {
        color: #94a3b8;
        margin: 0;
    }
    .impulso-btn {
        background-color: var(--impulso-cyan);
        color: var(--impulso-dark) !important;
        padding: 12px 24px;
        border-radius: 8px;
        font-weight: 800;
        text-decoration: none !important;
        text-transform: uppercase;
        font-size: 13px;
        letter-spacing: 1px;
        transition: all 0.3s ease;
        display: flex;
        align-items: center;
        gap: 10px;
    }
    .impulso-btn:hover {
        background-color: #fff;
        transform: translateY(-2px);
        box-shadow: 0 0 20px rgba(34, 211, 238, 0.4);
    }
</style>
{% endblock %}

{% block content_main %}
    <div class="impulso-banner">
        <div class="impulso-text">
            <h2>Gestión Impulso Shop</h2>
            <p>Accede al panel de control avanzado con métricas en tiempo real y gestión optimizada.</p>
        </div>
        <a href="{% url 'catalog:dashboard_products' %}" class="impulso-btn">
            Ir al Dashboard <span>&rarr;</span>
        </a>
    </div>
    {{ block.super }}
{% endblock %}
